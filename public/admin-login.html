<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TrendPulse | Core Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'fade-in': 'fadeIn 0.6s ease-out forwards',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'scale(0.95)' },
                            '100%': { opacity: '1', transform: 'scale(1)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0b1120; }
        .glass-panel {
            background: linear-gradient(135deg, rgba(40,20,20,0.6) 0%, rgba(20,20,30,0.9) 100%);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(239, 68, 68, 0.2);
            box-shadow: 0 25px 50px -12px rgba(239, 68, 68, 0.1);
        }
        .input-glass {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .input-glass:focus {
            background: rgba(15, 23, 42, 0.7);
            border-color: #ef4444;
            box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.2);
        }
    </style>

    

    

    <!-- Universal Light Mode Override -->
    <style id="light-mode-overrides">
        html:not(.dark) body { background: #f1f5f9 !important; color: #0f172a !important; }
        html:not(.dark) main { background: #f1f5f9 !important; }
        html:not(.dark) .animate-float { opacity: 0.15 !important; mix-blend-mode: multiply; }
        html:not(.dark) .glass-card, html:not(.dark) .glass-panel, html:not(.dark) .bg-glass, html:not(.dark) aside, html:not(.dark) header {
            background: rgba(255,255,255,0.95) !important;
            border-color: rgba(0,0,0,0.1) !important;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05) !important;
        }
        html:not(.dark) .bg-slate-900 { background: #ffffff !important; }
        html:not(.dark) .bg-slate-800 { background: #e2e8f0 !important; }
        html:not(.dark) .border-slate-800, html:not(.dark) .border-slate-700 { border-color: #cbd5e1 !important; }
        html:not(.dark) .text-white { color: #0f172a !important; text-shadow: none !important; }
        html:not(.dark) .text-slate-200, html:not(.dark) .text-slate-300 { color: #334155 !important; }
        html:not(.dark) .text-slate-400 { color: #64748b !important; }
        html:not(.dark) .text-slate-500 { color: #94a3b8 !important; }
        html:not(.dark) .bg-slate-900\/50, html:not(.dark) .bg-slate-800\/80, html:not(.dark) .bg-slate-900\/60, html:not(.dark) .bg-slate-800\/50, html:not(.dark) .bg-slate-900\/40 { background: rgba(255,255,255,0.95) !important; }
        html:not(.dark) .bg-slate-900\/20, html:not(.dark) .bg-slate-800\/30 { background: rgba(241,245,249,0.95) !important; text-shadow: none !important; }
        html:not(.dark) input.input-glass, html:not(.dark) select { background: #ffffff !important; color: #0f172a !important; border: 1px solid #cbd5e1 !important; }
        html:not(.dark) .from-white { --tw-gradient-from: #0f172a !important; }
        html:not(.dark) .to-slate-400 { --tw-gradient-to: #475569 !important; }
        html:not(.dark) canvas { filter: none; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center text-slate-200 relative overflow-hidden">
    
    <!-- Animated Background Spheres (Red/Amber for Admin) -->
    <div class="absolute top-[0%] left-[-5%] w-[500px] h-[500px] bg-red-600/10 rounded-full blur-[100px] animate-float" style="animation-delay: 0s;"></div>
    <div class="absolute bottom-[-10%] right-[10%] w-[400px] h-[400px] bg-amber-600/10 rounded-full blur-[120px] animate-float" style="animation-delay: 2s;"></div>

    <div class="w-full max-w-md p-10 glass-panel rounded-3xl animate-fade-in relative z-10 m-4">
        <div class="text-center mb-8 gap-2 flex flex-col items-center">
            <img src="/light.jpeg" class="h-24 w-auto mx-auto mb-3 dark:hidden drop-shadow-md" alt="TrendPulse">
            <img src="/dark.jpeg" class="h-24 w-auto mx-auto mb-3 hidden dark:block drop-shadow-lg" alt="TrendPulse">
            <h1 class="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-400 mb-1">TrendPulse</h1>
            <p class="text-rose-400/80 text-sm mt-1 font-medium uppercase tracking-widest text-[10px]">Restricted Personnel Only</p>
        </div>

        <form id="adminForm" class="space-y-6">
            <div>
                <label for="username" class="block text-sm font-medium text-slate-300 mb-1.5 ml-1">Admin ID</label>
                <input id="username" type="text" required class="w-full px-5 py-3.5 input-glass rounded-xl text-white placeholder-slate-500 transition-all outline-none text-sm" placeholder="admin" />
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-slate-300 mb-1.5 ml-1">Passkey</label>
                <div class="relative group">
                    <input id="password" type="password" required class="w-full pl-5 pr-12 py-3.5 input-glass rounded-xl text-white placeholder-slate-500 transition-all outline-none text-sm" placeholder="••••••••" />
                    <button type="button" onclick="const p=document.getElementById('password'); const isPwd=p.type==='password'; p.type=isPwd?'text':'password'; this.innerHTML=isPwd?'<svg class=\'w-5 h-5\' fill=\'none\' stroke=\'currentColor\' viewBox=\'0 0 24 24\'><path stroke-linecap=\'round\' stroke-linejoin=\'round\' stroke-width=\'2\' d=\'M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21\'></path></svg>':'<svg class=\'w-5 h-5\' fill=\'none\' stroke=\'currentColor\' viewBox=\'0 0 24 24\'><path stroke-linecap=\'round\' stroke-linejoin=\'round\' stroke-width=\'2\' d=\'M15 12a3 3 0 11-6 0 3 3 0 016 0z\'></path><path stroke-linecap=\'round\' stroke-linejoin=\'round\' stroke-width=\'2\' d=\'M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z\'></path></svg>';" class="absolute inset-y-0 right-0 flex items-center px-4 text-slate-500 hover:text-slate-300 transition-colors focus:outline-none">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                    </button>
                </div>
            </div>

            <button type="submit" class="w-full py-3.5 px-4 mt-4 bg-gradient-to-r from-red-600 to-rose-700 hover:from-red-500 hover:to-rose-600 text-white rounded-xl font-semibold shadow-[0_0_20px_rgba(225,29,72,0.4)] hover:shadow-[0_0_25px_rgba(225,29,72,0.6)] transition-all transform hover:-translate-y-1">
                Initiate Override
            </button>
        </form>

        <p class="message text-center text-sm font-medium mt-5 text-red-400 hidden bg-slate-900/50 py-2 rounded-lg" id="message"></p>
        
        <div class="mt-8 pt-6 border-t border-slate-700/50 text-center">
            <p class="text-sm text-slate-400 font-medium">
                <a href="/login.html" class="text-slate-500 hover:text-white transition-colors">← Return to Standard Node</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('adminForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const msg = document.getElementById('message');
            
            if(u === 'admin123' && p === 'Admin@123') {
                msg.textContent = 'Override accepted. Redirecting to Admin Core...';
                msg.classList.remove('hidden');
                msg.classList.replace('text-red-400', 'text-emerald-400');
                sessionStorage.setItem('tp-admin-auth', 'true');
                setTimeout(() => window.location.href = '/admin', 800);
            } else {
                msg.textContent = 'ACCESS DENIED: Invalid Administrator Credentials.';
                msg.classList.remove('hidden');
            }
        });
    </script>

    

    

    <!-- Theme Toggle -->
    <button id="themeToggle" onclick="document.documentElement.classList.toggle('dark'); localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light'); if(window.updateChartsTheme) window.updateChartsTheme()" class="fixed bottom-6 right-6 z-50 p-3.5 rounded-full bg-white dark:bg-slate-800/80 backdrop-blur border border-slate-200 dark:border-slate-700/50 text-amber-500 dark:text-amber-400 hover:scale-110 transition-transform shadow-xl flex items-center justify-center group">
        <svg class="w-6 h-6 dark:hidden group-hover:rotate-12 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
        <svg class="w-6 h-6 hidden dark:block group-hover:rotate-45 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
    </button>
    <script>
        if(localStorage.getItem('theme') === 'light') document.documentElement.classList.remove('dark');
    </script>
</body>
</html>
