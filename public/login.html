<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TrendPulse | User Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'fade-in': 'fadeIn 0.6s ease-out forwards',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'scale(0.95)' },
                            '100%': { opacity: '1', transform: 'scale(1)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0b1120; }
        .glass-panel {
            background: linear-gradient(135deg, rgba(30,30,40,0.6) 0%, rgba(20,20,30,0.8) 100%);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .input-glass {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .input-glass:focus {
            background: rgba(15, 23, 42, 0.7);
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }
    </style>

    

    

    <!-- Universal Light Mode Override -->
    <style id="light-mode-overrides">
        html:not(.dark) body { background: #f1f5f9 !important; color: #0f172a !important; }
        html:not(.dark) main { background: #f1f5f9 !important; }
        html:not(.dark) .animate-float { opacity: 0.15 !important; mix-blend-mode: multiply; }
        html:not(.dark) .glass-card, html:not(.dark) .glass-panel, html:not(.dark) .bg-glass, html:not(.dark) aside, html:not(.dark) header {
            background: rgba(255,255,255,0.95) !important;
            border-color: rgba(0,0,0,0.1) !important;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05) !important;
        }
        html:not(.dark) .bg-slate-900 { background: #ffffff !important; }
        html:not(.dark) .bg-slate-800 { background: #e2e8f0 !important; }
        html:not(.dark) .border-slate-800, html:not(.dark) .border-slate-700 { border-color: #cbd5e1 !important; }
        html:not(.dark) .text-white { color: #0f172a !important; text-shadow: none !important; }
        html:not(.dark) .text-slate-200, html:not(.dark) .text-slate-300 { color: #334155 !important; }
        html:not(.dark) .text-slate-400 { color: #64748b !important; }
        html:not(.dark) .text-slate-500 { color: #94a3b8 !important; }
        html:not(.dark) .bg-slate-900\/50, html:not(.dark) .bg-slate-800\/80, html:not(.dark) .bg-slate-900\/60, html:not(.dark) .bg-slate-800\/50, html:not(.dark) .bg-slate-900\/40 { background: rgba(255,255,255,0.95) !important; }
        html:not(.dark) .bg-slate-900\/20, html:not(.dark) .bg-slate-800\/30 { background: rgba(241,245,249,0.95) !important; text-shadow: none !important; }
        html:not(.dark) input.input-glass, html:not(.dark) select { background: #ffffff !important; color: #0f172a !important; border: 1px solid #cbd5e1 !important; }
        html:not(.dark) .from-white { --tw-gradient-from: #0f172a !important; }
        html:not(.dark) .to-slate-400 { --tw-gradient-to: #475569 !important; }
        html:not(.dark) canvas { filter: none; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center text-slate-200 relative overflow-hidden">
    
    <!-- Animated Background Spheres -->
    <div class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] bg-blue-600/20 rounded-full blur-[100px] animate-float" style="animation-delay: 0s;"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[600px] h-[600px] bg-emerald-600/10 rounded-full blur-[120px] animate-float" style="animation-delay: 2s;"></div>
    <div class="absolute top-[20%] right-[10%] w-[300px] h-[300px] bg-indigo-600/20 rounded-full blur-[100px] animate-float" style="animation-duration: 8s;"></div>

    <div class="w-full max-w-md p-10 glass-panel rounded-3xl animate-fade-in relative z-10 m-4">
        <div class="text-center mb-10 gap-2 flex flex-col items-center">
            <img src="/light.jpeg" class="h-24 w-auto mx-auto mb-3 dark:hidden drop-shadow-md" alt="TrendPulse">
            <img src="/dark.jpeg" class="h-24 w-auto mx-auto mb-3 hidden dark:block drop-shadow-lg" alt="TrendPulse">
            <h1 class="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-400 mb-1">TrendPulse</h1>
            <p class="text-slate-400 text-sm mt-1 font-medium">Authentication Portal</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label for="email" class="block text-sm font-medium text-slate-300 mb-1.5 ml-1">Email Address</label>
                <input id="email" type="email" required class="w-full px-5 py-3.5 input-glass rounded-xl text-white placeholder-slate-500 transition-all outline-none text-sm" placeholder="you@company.com" />
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-slate-300 mb-1.5 ml-1">Password</label>
                <input id="password" type="password" required class="w-full px-5 py-3.5 input-glass rounded-xl text-white placeholder-slate-500 transition-all outline-none text-sm" placeholder="••••••••" />
            </div>

            <button type="submit" class="w-full py-3.5 px-4 mt-4 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white rounded-xl font-semibold shadow-[0_0_20px_rgba(59,130,246,0.4)] hover:shadow-[0_0_25px_rgba(59,130,246,0.6)] transition-all transform hover:-translate-y-1">
                Secure Log In
            </button>
        </form>

        <p class="message text-center text-sm font-medium mt-5 text-red-400 hidden bg-slate-900/50 py-2 rounded-lg" id="message"></p>
        
        <div class="mt-8 pt-6 border-t border-slate-700/50 text-center">
            <p class="text-sm text-slate-400 font-medium">
                New researcher? <a href="/signup.html" class="text-blue-400 hover:text-white transition-colors">Apply for access</a>
            </p>
        </div>
    </div>

    <!-- The original logic relies on login.js updating message element -->
    <script src="/login.js"></script>
    <script>
        const observer = new MutationObserver((mutations) => {
            mutations.forEach((mutation) => {
                if (mutation.type === 'childList') {
                    const msg = document.getElementById('message');
                    if (msg.textContent.trim().length > 0) {
                        msg.classList.remove('hidden');
                        if(msg.textContent.includes('successful')) {
                            msg.classList.replace('text-red-400', 'text-emerald-400');
                        } else {
                            msg.classList.replace('text-emerald-400', 'text-red-400');
                        }
                    } else {
                        msg.classList.add('hidden');
                    }
                }
            });
        });
        observer.observe(document.getElementById('message'), { childList: true });
    </script>

    

    

    <!-- Theme Toggle -->
    <button id="themeToggle" onclick="document.documentElement.classList.toggle('dark'); localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light'); if(window.updateChartsTheme) window.updateChartsTheme()" class="fixed bottom-6 right-6 z-50 p-3.5 rounded-full bg-white dark:bg-slate-800/80 backdrop-blur border border-slate-200 dark:border-slate-700/50 text-amber-500 dark:text-amber-400 hover:scale-110 transition-transform shadow-xl flex items-center justify-center group">
        <svg class="w-6 h-6 dark:hidden group-hover:rotate-12 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
        <svg class="w-6 h-6 hidden dark:block group-hover:rotate-45 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
    </button>
    <script>
        if(localStorage.getItem('theme') === 'light') document.documentElement.classList.remove('dark');
    </script>
</body>
</html>
